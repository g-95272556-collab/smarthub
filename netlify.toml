# Netlify Configuration for SmartSchoolHub

[build]
  publish = "."
  functions = "netlify/functions"

# Redirect API routes to functions
[[redirects]]
  from = "/auth/google/*"
  to = "/.netlify/functions/google-oauth/:splat"
  status = 200
  force = true

# Keep production site focused on app assets only.
