# Netlify Configuration for SmartSchoolHub

[build]
  publish = "."
  functions = "netlify/functions"

# Redirect API routes to functions
[[redirects]]
  from = "/auth/google/*"
  to = "/.netlify/functions/google-oauth/:splat"
  status = 200
  force = true

# CORS and Security Headers
[[headers]]
  for = "/"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

[[headers]]
  for = "/*"
  [headers.values]
    # CORS
    Access-Control-Allow-Origin = "https://xbasmarthub.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With"
    
    # Security headers
    X-Frame-Options = "DENY"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https://lh3.googleusercontent.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://xbasmarthub.netlify.app https://smartschoolhub-skkiandongo.g-95272556.workers.dev https://smartschoolhub-google-oauth.g-95272556.workers.dev https://api.open-meteo.com https://api.waktusolat.app https://accounts.google.com https://api.telegram.org https://api.fonnte.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/auth/google/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://xbasmarthub.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Max-Age = "86400"

# PWA assets caching
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
